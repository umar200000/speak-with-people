name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /home/speak/app
            git pull origin main
            ./venv/bin/pip install -q python-telegram-bot fastapi "uvicorn[standard]"
            echo '${{ secrets.SERVER_PASSWORD }}' | sudo -S systemctl restart speak-bot
            sleep 2
            systemctl is-active speak-bot
